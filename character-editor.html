<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Character Editor — Fantasy CDM</title>
<style>
:root{--bg:#08090d;--sf:#10131c;--bd:#1c2236;--ac:#3ddc84;--tx:#e6e9f4;--mu:#424a66;--ct:#181d2a;--c2:#1e2438}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 10px}
header{font-family:'Courier New',monospace;font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;color:var(--ac);margin-bottom:12px}
.editor{display:grid;grid-template-columns:1fr 280px;width:100%;max-width:860px;background:var(--sf);border:1px solid var(--bd);border-radius:14px;overflow:hidden}
.left{display:flex;flex-direction:column;background:radial-gradient(ellipse 70% 55% at 45% 38%,#0d1828 0%,#050609 100%);height:500px}
#c{display:block;flex:1;cursor:grab;touch-action:none;width:100%;height:0}
#c:active{cursor:grabbing}
.vp-hint{font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mu);text-align:center;padding:4px 0 2px}
.anim-bar{display:flex;gap:5px;padding:8px 10px;background:rgba(0,0,0,.5);border-top:1px solid var(--bd);flex-wrap:wrap}
.anim-btn{flex:1;min-width:62px;background:var(--ct);color:var(--mu);border:1px solid var(--bd);border-radius:6px;font-family:'Courier New',monospace;font-size:.56rem;letter-spacing:.08em;text-transform:uppercase;padding:6px 3px;cursor:pointer;transition:all .13s;white-space:nowrap}
.anim-btn:hover{background:var(--c2);color:var(--tx)}
.anim-btn.active{background:var(--ac);color:#03200d;border-color:var(--ac);font-weight:700}
.fbx-zone{margin:8px 10px;border:1.5px dashed var(--bd);border-radius:8px;padding:11px 8px;text-align:center;cursor:pointer;transition:border-color .15s;font-size:.65rem;color:var(--mu)}
.fbx-zone:hover,.fbx-zone.drag-over{border-color:var(--ac);color:var(--ac)}
.fbx-status{margin:3px 10px 8px;font-family:'Courier New',monospace;font-size:.6rem;color:var(--mu);text-align:center;min-height:1.2em}
.fbx-status.ok{color:var(--ac)}.fbx-status.err{color:#ff6b6b}
.right{border-left:1px solid var(--bd);padding:14px 12px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.lbl{font-family:'Courier New',monospace;font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:var(--mu);margin-bottom:4px}
.ctrl{display:flex;flex-direction:column}
input[type=text],input[type=number]{background:var(--ct);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-family:'Courier New',monospace;padding:6px 10px;outline:none;transition:border-color .13s;width:100%;font-size:.88rem}
input[type=text]:focus,input[type=number]:focus{border-color:var(--ac)}
input[type=number]{font-size:1.8rem;font-weight:700;text-align:center}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .12s,border-color .12s}
.chip:hover{transform:scale(1.18)}.chip.sel{border-color:var(--ac)}
#face-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:1.5px;background:var(--bd);border:1.5px solid var(--bd);border-radius:5px;overflow:hidden;cursor:crosshair;user-select:none}
.px{aspect-ratio:1;background:var(--ct)}.px:hover{filter:brightness(1.5)}
#palette{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:4px}
.pc{aspect-ratio:1;border-radius:4px;cursor:pointer;border:1.5px solid transparent;transition:transform .1s,border-color .1s;display:flex;align-items:center;justify-content:center;font-size:.6rem}
.pc:hover{transform:scale(1.12)}.pc.sel{border-color:var(--ac)}
.sep{height:1px;background:var(--bd)}
.btn-sm{background:transparent;border:1px solid var(--bd);border-radius:5px;color:var(--mu);font-family:'Courier New',monospace;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;padding:5px 8px;cursor:pointer;transition:all .13s}
.btn-sm:hover{border-color:var(--ac);color:var(--ac)}
@media(max-width:600px){.editor{grid-template-columns:1fr}.right{border-left:none;border-top:1px solid var(--bd)}.left{height:380px}}
</style>
</head>
<body>
<header>&#x2B1B; Character Editor &mdash; 14 bones + FBX Mixamo import</header>
<div class="editor">
  <div class="left">
    <canvas id="c"></canvas>
    <div class="vp-hint">Drag to rotate &middot; Double-clic : auto-rotation</div>
    <div class="anim-bar">
      <button class="anim-btn active" data-anim="idle">&#129464; Idle</button>
      <button class="anim-btn" data-anim="walk">&#128694; Marche</button>
      <button class="anim-btn" data-anim="run">&#127939; Course</button>
      <button class="anim-btn" data-anim="goal">&#127881; But!</button>
      <button class="anim-btn" data-anim="tackle">&#128170; Tacle</button>
      <button class="anim-btn" data-anim="dance">&#128378; Danse</button>
      <button class="anim-btn" id="btn-fbx-play" data-anim="imported" style="display:none">&#128230; FBX</button>
    </div>
    <div class="fbx-zone" id="fbx-zone">
      &#128193; Deposer un <strong>.fbx</strong> Mixamo ici
      <span style="font-size:.58rem;opacity:.6;display:block;margin-top:2px">ou cliquer pour ouvrir</span>
    </div>
    <div class="fbx-status" id="fbx-status"></div>
    <input type="file" id="fbx-input" accept=".fbx" style="display:none">
  </div>
  <div class="right">
    <div class="ctrl"><div class="lbl">Nom du joueur</div>
      <input type="text" id="inp-name" value="Mbappe" maxlength="14">
    </div>
    <div class="ctrl"><div class="lbl">Numero</div>
      <input type="number" id="inp-num" value="10" min="1" max="99">
    </div>
    <div class="sep"></div>
    <div class="ctrl"><div class="lbl">Couleur de peau</div>
      <div class="chips" id="skin-chips"></div>
    </div>
    <div class="ctrl"><div class="lbl">Maillot</div>
      <div class="chips" id="jersey-chips"></div>
    </div>
    <div class="sep"></div>
    <div class="ctrl">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div class="lbl" style="margin:0">Visage 10x10</div>
        <button class="btn-sm" id="btn-clear">Effacer</button>
      </div>
      <div id="face-grid"></div>
      <div id="palette"></div>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

// ================================================
// STATE
// ================================================
var S = {
  vRotY:0.42, vRotX:-0.16,
  dragging:false, lastX:0, lastY:0, autoRot:true,
  skinColor:'#d4956a', jerseyColor:'#1a4fd6',
  name:'Mbappe', num:'10',
  faceGrid:null,
  paintColor:'#2c1a0e', painting:false,
  anim:'idle', animT:0, charYOff:0,
  importedAnim:null,
};

// faceGrid 10x10
S.faceGrid = [];
for(var _ri=0;_ri<10;_ri++){
  S.faceGrid[_ri]=[];
  for(var _ci=0;_ci<10;_ci++) S.faceGrid[_ri][_ci]=null;
}

var SKIN_COLS   = ['#f5c89a','#e0a87a','#c68642','#8d5524','#4a2810'];
var JERSEY_COLS = ['#1a4fd6','#cc2222','#1a8c3c','#e07b00','#111128','#d8d8d8'];
var FACE_PAL    = ['#f5c89a','#e0a87a','#c68642','#8d5524','#4a2810',
                   '#2c1a0e','#0a0a0a','#d4a017','#7a3b1e','#f0e6c0',
                   '#e06060','#ffffff',null];

// ================================================
// MATH
// ================================================
function add3(a,b){return{x:a.x+b.x,y:a.y+b.y,z:a.z+b.z};}
function sub3(a,b){return{x:a.x-b.x,y:a.y-b.y,z:a.z-b.z};}
function dot3(a,b){return a.x*b.x+a.y*b.y+a.z*b.z;}
function norm3(v){var l=Math.sqrt(v.x*v.x+v.y*v.y+v.z*v.z)||1;return{x:v.x/l,y:v.y/l,z:v.z/l};}
function rX(p,a){var c=Math.cos(a),s=Math.sin(a);return{x:p.x,y:p.y*c-p.z*s,z:p.y*s+p.z*c};}
function rY(p,a){var c=Math.cos(a),s=Math.sin(a);return{x:p.x*c+p.z*s,y:p.y,z:-p.x*s+p.z*c};}
function rZ(p,a){var c=Math.cos(a),s=Math.sin(a);return{x:p.x*c-p.y*s,y:p.x*s+p.y*c,z:p.z};}
function applyRot(p,r){
  var q={x:p.x,y:p.y,z:p.z};
  if(r.x)q=rX(q,r.x);
  if(r.y)q=rY(q,r.y);
  if(r.z)q=rZ(q,r.z);
  return q;
}
function aroundPivot(p,piv,rot){return add3(applyRot(sub3(p,piv),rot),piv);}
function shadeHex(hex,f){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return'rgb('+Math.min(255,r*f|0)+','+Math.min(255,g*f|0)+','+Math.min(255,b*f|0)+')';
}

var LIGHT=norm3({x:0.55,y:0.85,z:0.72});

// ================================================
// SKELETON — 14 bones
// Y: feet y=-6, hips pivot y=6, shoulder pivot y=18, neck pivot y=21, head top y=29
// ================================================
function mkBone(id,bx,by,bz,bw,bh,bd,px,py,pz,parent){
  return{id:id,box:{x:bx,y:by,z:bz,w:bw,h:bh,d:bd},
         pivot:{x:px,y:py,z:pz},parent:parent,rot:{x:0,y:0,z:0}};
}
var BONES={
  HIPS:        mkBone('HIPS',          0,  9,   0, 7,6,4,  0, 6,0, null),
  SPINE:       mkBone('SPINE',         0, 15,   0, 8,6,4,  0,12,0, 'HIPS'),
  NECK:        mkBone('NECK',          0, 19.5, 0, 4,3,3,  0,18,0, 'SPINE'),
  HEAD:        mkBone('HEAD',          0, 25,   0, 8,8,8,  0,21,0, 'NECK'),
  L_SHOULDER:  mkBone('L_SHOULDER',   -4, 18,   0, 4,2,3,  0,18,0, 'SPINE'),
  L_UPPER_ARM: mkBone('L_UPPER_ARM',  -6, 15,   0, 4,6,3, -6,18,0, 'L_SHOULDER'),
  L_LOWER_ARM: mkBone('L_LOWER_ARM',  -6,  9,   0, 3,6,3, -6,12,0, 'L_UPPER_ARM'),
  R_SHOULDER:  mkBone('R_SHOULDER',    4, 18,   0, 4,2,3,  0,18,0, 'SPINE'),
  R_UPPER_ARM: mkBone('R_UPPER_ARM',   6, 15,   0, 4,6,3,  6,18,0, 'R_SHOULDER'),
  R_LOWER_ARM: mkBone('R_LOWER_ARM',   6,  9,   0, 3,6,3,  6,12,0, 'R_UPPER_ARM'),
  L_UPPER_LEG: mkBone('L_UPPER_LEG',  -2,  3,   0, 4,6,4, -2, 6,0, 'HIPS'),
  L_LOWER_LEG: mkBone('L_LOWER_LEG',  -2, -3,   0, 4,6,4, -2, 0,0, 'L_UPPER_LEG'),
  R_UPPER_LEG: mkBone('R_UPPER_LEG',   2,  3,   0, 4,6,4,  2, 6,0, 'HIPS'),
  R_LOWER_LEG: mkBone('R_LOWER_LEG',   2, -3,   0, 4,6,4,  2, 0,0, 'R_UPPER_LEG'),
};

// Pre-compute ancestor chains [self, parent, grandparent, ...]
var CHAINS={};
Object.keys(BONES).forEach(function(id){
  var c=[],cur=id;
  while(cur){c.push(cur);cur=BONES[cur]?BONES[cur].parent:null;}
  CHAINS[id]=c;
});

function worldPos(v,boneId){
  var p={x:v.x,y:v.y,z:v.z};
  var chain=CHAINS[boneId];
  for(var i=0;i<chain.length;i++)
    p=aroundPivot(p,BONES[chain[i]].pivot,BONES[chain[i]].rot);
  p.y+=S.charYOff;
  return p;
}
function worldNorm(n,boneId){
  var q={x:n.x,y:n.y,z:n.z};
  var chain=CHAINS[boneId];
  for(var i=0;i<chain.length;i++)
    q=applyRot(q,BONES[chain[i]].rot);
  return q;
}

// ================================================
// CANVAS + PROJECTION
// ================================================
var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var CX=200,CY=160,SCALE=6;

function resize(){
  var left=document.querySelector('.left');
  if(!left)return;
  var W=left.clientWidth;
  var H=left.clientHeight;
  if(!W||!H)return;
  // Canvas takes up the space minus the bottom controls
  var bottom=0;
  var sels=['.anim-bar','.fbx-zone','.fbx-status','.vp-hint'];
  for(var i=0;i<sels.length;i++){
    var el=left.querySelector(sels[i]);
    if(el)bottom+=el.offsetHeight||0;
  }
  var canvasH=Math.max(160,H-bottom-4);
  canvas.width=Math.max(100,W);
  canvas.height=canvasH;
  SCALE=Math.min(canvas.width,canvas.height)/54;
  CX=canvas.width*0.5;
  CY=canvas.height*0.52;
}

function project(p){
  var r=rX(rY(p,S.vRotY),S.vRotX);
  return{x:CX+r.x*SCALE, y:CY-r.y*SCALE, z:r.z};
}

// ================================================
// BONE COLOR
// ================================================
function boneColor(id){
  if(id==='HEAD'||id==='NECK'||id==='L_LOWER_ARM'||id==='R_LOWER_ARM')return S.skinColor;
  if(id==='L_UPPER_LEG'||id==='R_UPPER_LEG'||
     id==='L_LOWER_LEG'||id==='R_LOWER_LEG')return '#111128';
  return S.jerseyColor;
}

// ================================================
// GEOMETRY
// ================================================
var FACE_DEFS=[
  {fn:'front',vi:[0,1,5,4],nx:0,ny:0,nz:1},
  {fn:'back', vi:[3,2,6,7],nx:0,ny:0,nz:-1},
  {fn:'top',  vi:[2,3,1,0],nx:0,ny:1,nz:0},
  {fn:'bot',  vi:[4,5,7,6],nx:0,ny:-1,nz:0},
  {fn:'left', vi:[2,0,4,6],nx:-1,ny:0,nz:0},
  {fn:'right',vi:[1,3,7,5],nx:1,ny:0,nz:0},
];

function getBoneFaces(bone){
  var b=bone.box;
  var hw=b.w/2,hh=b.h/2,hd=b.d/2,cx=b.x,cy=b.y,cz=b.z;
  var V=[
    {x:cx-hw,y:cy+hh,z:cz+hd},{x:cx+hw,y:cy+hh,z:cz+hd},
    {x:cx-hw,y:cy+hh,z:cz-hd},{x:cx+hw,y:cy+hh,z:cz-hd},
    {x:cx-hw,y:cy-hh,z:cz+hd},{x:cx+hw,y:cy-hh,z:cz+hd},
    {x:cx-hw,y:cy-hh,z:cz-hd},{x:cx+hw,y:cy-hh,z:cz-hd},
  ];
  var WV=[];
  for(var i=0;i<V.length;i++) WV.push(worldPos(V[i],bone.id));

  var out=[];
  for(var fi=0;fi<FACE_DEFS.length;fi++){
    var fd=FACE_DEFS[fi];
    var wn=rX(rY(worldNorm({x:fd.nx,y:fd.ny,z:fd.nz},bone.id),S.vRotY),S.vRotX);
    if(wn.z<=0)continue;
    var v2d=[];
    for(var vi=0;vi<fd.vi.length;vi++) v2d.push(project(WV[fd.vi[vi]]));
    var centZ=(v2d[0].z+v2d[1].z+v2d[2].z+v2d[3].z)*0.25;
    var shad=Math.min(1,Math.max(0.28,0.28+0.72*dot3(wn,LIGHT)));
    out.push({fn:fd.fn,v2d:v2d,centZ:centZ,shad:shad,bone:bone});
  }
  return out;
}

function bilerp(tl,tr,br,bl,u,v){
  var tx=tl.x+(tr.x-tl.x)*u,ty=tl.y+(tr.y-tl.y)*u;
  var bx=bl.x+(br.x-bl.x)*u,by=bl.y+(br.y-bl.y)*u;
  return{x:tx+(bx-tx)*v,y:ty+(by-ty)*v};
}
function drawFaceGrid(v2d,shad){
  var tl=v2d[0],tr=v2d[1],br=v2d[2],bl=v2d[3];
  var N=10;
  for(var row=0;row<N;row++){
    for(var col=0;col<N;col++){
      var c=S.faceGrid[row][col];if(!c)continue;
      var u0=col/N,u1=(col+1)/N,v0=row/N,v1=(row+1)/N;
      var p00=bilerp(tl,tr,br,bl,u0,v0),p10=bilerp(tl,tr,br,bl,u1,v0);
      var p11=bilerp(tl,tr,br,bl,u1,v1),p01=bilerp(tl,tr,br,bl,u0,v1);
      ctx.fillStyle=shadeHex(c,shad);
      ctx.beginPath();
      ctx.moveTo(p00.x,p00.y);ctx.lineTo(p10.x,p10.y);
      ctx.lineTo(p11.x,p11.y);ctx.lineTo(p01.x,p01.y);
      ctx.closePath();ctx.fill();
    }
  }
}

// ================================================
// RENDER
// ================================================
var chestFrontV2d=null,chestFrontShad=1;

function render(){
  if(!canvas.width||!canvas.height)return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  chestFrontV2d=null;

  var allFaces=[];
  var bkeys=Object.keys(BONES);
  for(var bi=0;bi<bkeys.length;bi++){
    var faces=getBoneFaces(BONES[bkeys[bi]]);
    for(var fi=0;fi<faces.length;fi++) allFaces.push(faces[fi]);
  }
  allFaces.sort(function(a,b){return a.centZ-b.centZ;});

  for(var i=0;i<allFaces.length;i++){
    var f=allFaces[i];
    ctx.fillStyle=shadeHex(boneColor(f.bone.id),f.shad);
    ctx.beginPath();
    ctx.moveTo(f.v2d[0].x,f.v2d[0].y);
    for(var j=1;j<f.v2d.length;j++) ctx.lineTo(f.v2d[j].x,f.v2d[j].y);
    ctx.closePath();ctx.fill();

    if(f.bone.id==='HEAD'&&f.fn==='front') drawFaceGrid(f.v2d,f.shad);
    if(f.bone.id==='SPINE'&&f.fn==='front'){chestFrontV2d=f.v2d;chestFrontShad=f.shad;}

    ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=0.6;
    ctx.beginPath();
    ctx.moveTo(f.v2d[0].x,f.v2d[0].y);
    for(var k=1;k<f.v2d.length;k++) ctx.lineTo(f.v2d[k].x,f.v2d[k].y);
    ctx.closePath();ctx.stroke();
  }

  if(chestFrontV2d){
    var fcx=0,fcy=0;
    for(var m=0;m<4;m++){fcx+=chestFrontV2d[m].x;fcy+=chestFrontV2d[m].y;}
    fcx*=0.25;fcy*=0.25;
    var sz=SCALE*2.0;
    ctx.font='900 '+sz+'px "Courier New",monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(0,0,0,'+(0.4*chestFrontShad)+')';
    ctx.fillText(S.num,fcx+1,fcy+1);
    ctx.fillStyle='rgba(255,255,255,'+(0.82*chestFrontShad)+')';
    ctx.fillText(S.num,fcx,fcy);
  }

  var nsz=Math.max(8,SCALE*0.8);
  ctx.font='700 '+nsz+'px "Courier New",monospace';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillStyle='rgba(230,233,244,0.35)';
  ctx.fillText(S.name,CX,CY+SCALE*10.5);
}

// ================================================
// ANIMATIONS
// ================================================
var B=BONES;
function resetBones(){
  var keys=Object.keys(B);
  for(var i=0;i<keys.length;i++) B[keys[i]].rot={x:0,y:0,z:0};
  S.charYOff=0;
}

function animIdle(t){
  B.NECK.rot       ={x:0,y:Math.sin(t*0.7)*0.09,z:Math.sin(t*0.4)*0.02};
  B.HEAD.rot       ={x:0,y:Math.sin(t*0.7)*0.04,z:Math.sin(t*0.4)*0.01};
  B.L_UPPER_ARM.rot={x:Math.sin(t*0.9)*0.07,y:0,z:-0.08-Math.sin(t*0.6)*0.03};
  B.R_UPPER_ARM.rot={x:Math.sin(t*0.9+1)*0.07,y:0,z:0.08+Math.sin(t*0.6)*0.03};
  B.HIPS.rot       ={x:0,y:0,z:Math.sin(t*0.5)*0.012};
}
function animWalk(t){
  var s=Math.sin(t*3.5);
  B.L_UPPER_LEG.rot={x:-s*0.52,y:0,z:0};B.R_UPPER_LEG.rot={x:s*0.52,y:0,z:0};
  B.L_LOWER_LEG.rot={x:Math.max(0,s)*0.55,y:0,z:0};B.R_LOWER_LEG.rot={x:Math.max(0,-s)*0.55,y:0,z:0};
  B.L_SHOULDER.rot={x:s*0.05,y:0,z:0};B.R_SHOULDER.rot={x:-s*0.05,y:0,z:0};
  B.L_UPPER_ARM.rot={x:s*0.38,y:0,z:-0.08};B.R_UPPER_ARM.rot={x:-s*0.38,y:0,z:0.08};
  B.L_LOWER_ARM.rot={x:-Math.max(0,s)*0.35,y:0,z:0};B.R_LOWER_ARM.rot={x:-Math.max(0,-s)*0.35,y:0,z:0};
  B.NECK.rot={x:Math.abs(s)*0.03,y:0,z:0};B.HIPS.rot={x:0,y:0,z:s*0.025};
}
function animRun(t){
  S.charYOff=Math.abs(Math.sin(t*5))*0.8;

  B.L_UPPER_LEG.rot={x:-s*0.85,y:0,z:0};B.R_UPPER_LEG.rot={x:s*0.85,y:0,z:0};

  B.L_UPPER_ARM.rot={x:s*0.65,y:0,z:-0.1};B.R_UPPER_ARM.rot={x:-s*0.65,y:0,z:0.1};
  B.L_LOWER_ARM.rot={x:-0.2-Math.max(0,s)*0.5,y:0,z:0};B.R_LOWER_ARM.rot={x:-0.2-Math.max(0,-s)*0.5,y:0,z:0};
  B.SPINE.rot={x:0.12,y:0,z:s*0.04};B.NECK.rot={x:-0.08+Math.abs(s)*0.05,y:0,z:0};
}
function animGoal(t){
  S.charYOff=Math.abs(Math.sin(t*3))*3.5;
  var p=Math.sin(t*3);
  B.L_SHOULDER.rot={x:0,y:0,z:-0.4+p*0.1};B.R_SHOULDER.rot={x:0,y:0,z:0.4-p*0.1};
  B.L_UPPER_ARM.rot={x:0,y:0,z:-2.1+p*0.2};B.R_UPPER_ARM.rot={x:0,y:0,z:2.1-p*0.2};
  B.L_LOWER_ARM.rot={x:-0.2,y:0,z:p*0.15};B.R_LOWER_ARM.rot={x:-0.2,y:0,z:-p*0.15};
  B.NECK.rot={x:-0.1,y:Math.sin(t*2)*0.12,z:0};B.HEAD.rot={x:-0.1,y:Math.sin(t*2)*0.08,z:0};
  B.L_UPPER_LEG.rot={x:Math.sin(t*3)*0.18,y:0,z:0};B.R_UPPER_LEG.rot={x:-Math.sin(t*3)*0.18,y:0,z:0};
  B.SPINE.rot={x:-0.05,y:0,z:p*0.03};
}
function animTackle(t){
  B.HIPS.rot={x:0.6,y:0,z:0};
  B.R_UPPER_LEG.rot={x:-1.05,y:0,z:0};B.R_LOWER_LEG.rot={x:0.3,y:0,z:0};
  B.L_UPPER_LEG.rot={x:0.4,y:0,z:0.12};B.L_LOWER_LEG.rot={x:0.5,y:0,z:0};
  B.L_SHOULDER.rot={x:-0.15,y:0,z:-0.1};B.R_SHOULDER.rot={x:-0.1,y:0,z:0.1};
  B.L_UPPER_ARM.rot={x:-0.6,y:0,z:-0.35};B.L_LOWER_ARM.rot={x:-0.3,y:0,z:0};
  B.R_UPPER_ARM.rot={x:-0.4,y:0,z:0.3};B.R_LOWER_ARM.rot={x:-0.2,y:0,z:0};
  B.NECK.rot={x:-0.15+Math.sin(t)*0.02,y:Math.sin(t*0.8)*0.06,z:0};
}
function animDance(t){
  S.charYOff=Math.abs(Math.sin(t*4))*0.5;
  var s=Math.sin(t*4);
  B.L_SHOULDER.rot={x:s*0.1,y:0,z:-0.3-s*0.2};B.R_SHOULDER.rot={x:-s*0.1,y:0,z:0.3+s*0.2};
  B.L_UPPER_ARM.rot={x:s*0.2,y:0,z:-1.5-s*0.7};B.R_UPPER_ARM.rot={x:-s*0.2,y:0,z:1.5+s*0.7};
  B.L_LOWER_ARM.rot={x:0.2+Math.abs(s)*0.4,y:0,z:0};B.R_LOWER_ARM.rot={x:0.2+Math.abs(s)*0.4,y:0,z:0};
  B.NECK.rot={x:0,y:Math.sin(t*2)*0.22,z:Math.sin(t*4)*0.07};
  B.HEAD.rot={x:0,y:Math.sin(t*2)*0.13,z:Math.sin(t*4)*0.03};
  B.L_UPPER_LEG.rot={x:s*0.25,y:0,z:0};B.R_UPPER_LEG.rot={x:-s*0.25,y:0,z:0};
  B.L_LOWER_LEG.rot={x:Math.max(0,s)*0.3,y:0,z:0};B.R_LOWER_LEG.rot={x:Math.max(0,-s)*0.3,y:0,z:0};
  B.HIPS.rot={x:0,y:0,z:Math.sin(t*2)*0.06};
}
function animImported(t){
  if(!S.importedAnim)return;
  var anim=S.importedAnim;
  var fi=Math.floor(t*anim.fps)%anim.frameCount;
  var frame=anim.frames[fi];if(!frame)return;
  var ids=Object.keys(frame);
  for(var i=0;i<ids.length;i++){
    var id=ids[i];
    if(BONES[id])BONES[id].rot={x:frame[id].x,y:frame[id].y,z:frame[id].z};
  }
}
var ANIMS={idle:animIdle,walk:animWalk,run:animRun,goal:animGoal,tackle:animTackle,dance:animDance,imported:animImported};

// ================================================
// MAIN LOOP
// ================================================
var last=0;
function loop(ts){
  ts=ts||0;
  var dt=Math.min((ts-last)/1000,0.05);
  last=ts;
  S.animT+=dt;
  resetBones();
  if(ANIMS[S.anim])ANIMS[S.anim](S.animT);
  if(S.autoRot&&!S.dragging)S.vRotY+=0.007;
  render();
  requestAnimationFrame(loop);
}

  S.dragging=true;S.autoRot=false;S.lastX=e.clientX;S.lastY=e.clientY;

  if(!S.dragging)return;
  S.vRotY+=(e.clientX-S.lastX)*0.013;
  S.vRotX+=(e.clientY-S.lastY)*0.013;
  S.vRotX=Math.max(-1.1,Math.min(1.1,S.vRotX));
  S.lastX=e.clientX;S.lastY=e.clientY;
});

  S.lastX=e.touches[0].clientX;S.lastY=e.touches[0].clientY;
},{passive:false});

// ================================================
// FBX IMPORT — Three.js charge lazily a la demande
// ================================================
var MIXAMO_MAP={
  mixamorigHips:'HIPS',                    Hips:'HIPS',
  mixamorigSpine:'SPINE',                  Spine:'SPINE',
  mixamorigSpine1:'SPINE',                 Spine1:'SPINE',
  mixamorigSpine2:'SPINE',                 Spine2:'SPINE',
  mixamorigNeck:'NECK',                    Neck:'NECK',
  mixamorigHead:'HEAD',                    Head:'HEAD',
  mixamorigLeftShoulder:'L_SHOULDER',      LeftShoulder:'L_SHOULDER',
  mixamorigLeftArm:'L_UPPER_ARM',          LeftArm:'L_UPPER_ARM',
  mixamorigLeftForeArm:'L_LOWER_ARM',      LeftForeArm:'L_LOWER_ARM',
  mixamorigRightShoulder:'R_SHOULDER',     RightShoulder:'R_SHOULDER',
  mixamorigRightArm:'R_UPPER_ARM',         RightArm:'R_UPPER_ARM',
  mixamorigRightForeArm:'R_LOWER_ARM',     RightForeArm:'R_LOWER_ARM',
  mixamorigLeftUpLeg:'L_UPPER_LEG',        LeftUpLeg:'L_UPPER_LEG',
  mixamorigLeftLeg:'L_LOWER_LEG',          LeftLeg:'L_LOWER_LEG',
  mixamorigRightUpLeg:'R_UPPER_LEG',       RightUpLeg:'R_UPPER_LEG',
  mixamorigRightLeg:'R_LOWER_LEG',         RightLeg:'R_LOWER_LEG',
};

var _fbxReady=false;
function loadFBXLibs(cb){
  if(_fbxReady){cb(null);return;}
  var BASE='https://cdn.jsdelivr.net/npm/three@0.132.2/build/';
  var EX='https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/';
  function s(src,next){
    var el=document.createElement('script');
    el.src=src;
    el.onload=function(){next(null);};
    el.onerror=function(){next(new Error('Impossible de charger: '+src.split('/').pop()));};
    document.head.appendChild(el);
  }
  s(BASE+'three.min.js',function(e1){
    if(e1){cb(e1);return;}
    s(EX+'libs/fflate.min.js',function(e2){
      if(e2){cb(e2);return;}
      s(EX+'loaders/FBXLoader.js',function(e3){
        if(e3){cb(e3);return;}
        _fbxReady=true;cb(null);
      });
    });
  });
}

function parseFBXAnim(obj){
  if(!obj.animations||!obj.animations.length)
    throw new Error('Aucune animation dans ce fichier');
  var clip=obj.animations[0];
  var FPS=30,frameCount=Math.ceil(clip.duration*FPS)+1;

  // Build name→node map (AnimationMixer évalue correctement les pre/post-rotations FBX)
  var nodeByName={};
  obj.traverse(function(node){if(node.name)nodeByName[node.name]=node;});

  var mnames=Object.keys(MIXAMO_MAP).filter(function(k){return MIXAMO_MAP[k]&&nodeByName[k];});
  if(!mnames.length)throw new Error('Aucun os Mixamo reconnu dans ce fichier');

  var mixer=new THREE.AnimationMixer(obj);
  mixer.clipAction(clip).play();

  // Capture la T-pose à t=0 pour normalisation delta
  mixer.setTime(0);
  var bindQ={};
  mnames.forEach(function(mn){bindQ[mn]=nodeByName[mn].quaternion.clone();});

  var frames=[];
  for(var f=0;f<frameCount;f++){
    mixer.setTime(f/FPS);
    var accum={};
    mnames.forEach(function(mn){
      var ourId=MIXAMO_MAP[mn];
      // delta = bindQ^-1 × frameQ : rotation pure depuis la T-pose, en espace local os
      var qDelta=bindQ[mn].clone().invert().multiply(nodeByName[mn].quaternion.clone());
      if(!accum[ourId])accum[ourId]={qx:0,qy:0,qz:0,qw:0,n:0};
      var a=accum[ourId];
      a.qx+=qDelta.x;a.qy+=qDelta.y;a.qz+=qDelta.z;a.qw+=qDelta.w;a.n++;
    });
    var frame={};
    Object.keys(accum).forEach(function(aid){
      var a=accum[aid],n=a.n;
      var avg=new THREE.Quaternion(a.qx/n,a.qy/n,a.qz/n,a.qw/n).normalize();
      var e=new THREE.Euler().setFromQuaternion(avg,'XYZ');
      frame[aid]={x:e.x,y:e.y,z:e.z};
    });
    frames.push(frame);
  }

  return{name:clip.name,fps:FPS,frameCount:frameCount,duration:clip.duration,frames:frames};
}

var fbxZone=document.getElementById('fbx-zone');
var fbxInput=document.getElementById('fbx-input');
var fbxStatus=document.getElementById('fbx-status');
var btnFbxPlay=document.getElementById('btn-fbx-play');

function handleFBXFile(file){
  if(!file.name.toLowerCase().endsWith('.fbx')){
    fbxStatus.className='fbx-status err';fbxStatus.textContent='Fichier .fbx requis';return;
  }
  fbxStatus.className='fbx-status';fbxStatus.textContent='Chargement Three.js...';
  loadFBXLibs(function(err){
    if(err){fbxStatus.className='fbx-status err';fbxStatus.textContent='Erreur: '+err.message;return;}
    fbxStatus.textContent='Parsing FBX...';
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var loader=new THREE.FBXLoader();
        var obj=loader.parse(e.target.result,'/');
        var anim=parseFBXAnim(obj);
        S.importedAnim=anim;
        fbxStatus.className='fbx-status ok';
        fbxStatus.textContent='OK: '+anim.name+' '+anim.duration.toFixed(1)+'s '+anim.frameCount+'fr '+Object.keys(anim.frames[0]||{}).length+' os';
        btnFbxPlay.style.display='';
        for(var j=0;j<animBtns.length;j++)animBtns[j].classList.remove('active');
        btnFbxPlay.classList.add('active');
        S.anim='imported';S.animT=0;
      }catch(e2){
        fbxStatus.className='fbx-status err';
        fbxStatus.textContent='Erreur: '+e2.message;
        console.error('FBX parse error:',e2);
      }
    };
    reader.onerror=function(){fbxStatus.className='fbx-status err';fbxStatus.textContent='Erreur lecture fichier';};
    reader.readAsArrayBuffer(file);
  });
}

fbxZone.addEventListener('click',function(){fbxInput.click();});
fbxInput.addEventListener('change',function(e){if(e.target.files[0])handleFBXFile(e.target.files[0]);});
fbxZone.addEventListener('dragover',function(e){e.preventDefault();fbxZone.classList.add('drag-over');});
fbxZone.addEventListener('dragleave',function(){fbxZone.classList.remove('drag-over');});
fbxZone.addEventListener('drop',function(e){
  e.preventDefault();fbxZone.classList.remove('drag-over');
  if(e.dataTransfer.files[0])handleFBXFile(e.dataTransfer.files[0]);
});

// FACE GRID
// ================================================
function buildFaceGrid(){
  var g=document.getElementById('face-grid');g.innerHTML='';
  for(var r=0;r<10;r++){
    for(var c=0;c<10;c++){
      var px=document.createElement('div');
      px.className='px';px.dataset.r=r;px.dataset.c=c;
      if(S.faceGrid[r][c])px.style.background=S.faceGrid[r][c];
      g.appendChild(px);
    }
  }
}
function paintPx(el){
  var r=+el.dataset.r,c=+el.dataset.c;if(isNaN(r))return;
  S.faceGrid[r][c]=S.paintColor;
  el.style.background=S.paintColor||'var(--ct)';
}
var gEl=document.getElementById('face-grid');
gEl.addEventListener('mousedown',function(e){if(e.target.classList.contains('px')){S.painting=true;paintPx(e.target);}});
gEl.addEventListener('mousemove',function(e){if(S.painting&&e.target.classList.contains('px'))paintPx(e.target);});
window.addEventListener('mouseup',function(){S.painting=false;});
gEl.addEventListener('touchstart',function(e){e.preventDefault();S.painting=true;},{passive:false});
gEl.addEventListener('touchmove',function(e){
  e.preventDefault();
  var te=e.touches[0];
  var el=document.elementFromPoint(te.clientX,te.clientY);
  if(el&&el.classList.contains('px'))paintPx(el);
},{passive:false});
gEl.addEventListener('touchend',function(){S.painting=false;});
document.getElementById('btn-clear').addEventListener('click',function(){
  for(var r=0;r<10;r++)for(var c=0;c<10;c++)S.faceGrid[r][c]=null;
  buildFaceGrid();
});

// ================================================
function buildPalette(){
  var p=document.getElementById('palette');p.innerHTML='';
  for(var i=0;i<FACE_PAL.length;i++){
    (function(col){
      var el=document.createElement('div');
      el.className='pc';
      if(col)el.style.background=col;else el.textContent='X';
      if(col===S.paintColor)el.classList.add('sel');
      el.addEventListener('click',function(){
        S.paintColor=col;
        p.querySelectorAll('.pc').forEach(function(e){e.classList.remove('sel');});
        el.classList.add('sel');
      });
      p.appendChild(el);
    })(FACE_PAL[i]);
  }
}

// COLOR CHIPS
// ================================================
function buildChips(id,cols,getVal,setVal){
  var cont=document.getElementById(id);cont.innerHTML='';
  for(var i=0;i<cols.length;i++){
    (function(col){
      var el=document.createElement('div');
      el.className='chip'+(col===getVal()?' sel':'');
      el.style.background=col;
      el.addEventListener('click',function(){setVal(col);buildChips(id,cols,getVal,setVal);});
      cont.appendChild(el);
    })(cols[i]);
  }
}
